# Tenant app (*.dguild.org) – used when Netlify site Base directory is repo root.
# If your tenant site uses Base directory = "apps/tenant", that folder's netlify.toml is used instead.
# Build must include config workspace so @decentraguild/config has dist/ before Nuxt runs.

[build]
  base = "."
  command = "pnpm install && pnpm exec turbo run build --filter=./packages/* --filter=./config && pnpm --filter tenant generate"
  publish = "apps/tenant/.output/public"

[build.environment]
  NODE_VERSION = "20"
