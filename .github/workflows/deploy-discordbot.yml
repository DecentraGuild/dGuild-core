# Deploys apps/discordbot to Railway on push to main when discordbot (or its deps) change, or manually.
# Setup: Railway → project → Settings → Tokens. GitHub → repo → Secrets → RAILWAY_DISCORDBOT_DEPLOY_TOKEN.
# Optional: RAILWAY_DISCORDBOT_SERVICE if the project has multiple services.

name: Deploy Discord bot

on:
  push:
    branches: [main]
    paths:
      - 'apps/discordbot/**'
  workflow_dispatch:

concurrency:
  group: deploy-discordbot
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy apps/discordbot
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_DISCORDBOT_DEPLOY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_DISCORDBOT_SERVICE }}
        working-directory: apps/discordbot
        run: |
          set -e
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "Missing secret RAILWAY_DISCORDBOT_DEPLOY_TOKEN (Railway project token)."
            exit 1
          fi
          if [ -n "$RAILWAY_SERVICE" ]; then
            railway up --ci --service "$RAILWAY_SERVICE"
          else
            railway up --ci
          fi
