# Builds the platform app (Nuxt static) and deploys to GitHub Pages.
# Repo Settings → Pages → Source: "GitHub Actions" must be selected.
# Runs only when platform or its dependencies change.

name: Deploy platform to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Same environment as deploy so secrets on "github-pages" are visible here.
    # Without this, only Repository secrets are available — env-only secrets stay empty at build.
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Supabase env for build
        env:
          URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$URL" ] || [ -z "$KEY" ]; then
            echo "::error::NUXT_PUBLIC_SUPABASE_URL and NUXT_PUBLIC_SUPABASE_ANON_KEY must be set (Repository secrets or github-pages environment secrets)."
            exit 1
          fi

      - name: Build platform (static)
        env:
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_ANON_KEY }}
          NUXT_PUBLIC_HELIUS_RPC: ${{ secrets.NUXT_PUBLIC_HELIUS_RPC }}
        run: pnpm run build:platform

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/platform/.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
