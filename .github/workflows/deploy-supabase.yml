# Pushes migrations and deploys Edge Functions to Supabase on changes to supabase/.
# No GitHub integration (Pro) needed: uses Supabase CLI with access token.
#
# Required repo secrets:
#   SUPABASE_ACCESS_TOKEN - create at https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD  - project database password (Settings → Database in dashboard)

name: Deploy Supabase

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
      - 'packages/core/src/address-book-defaults.data.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

env:
  SUPABASE_PROJECT_REF: uvktzcgghviyxausmkkc

jobs:
  deploy:
    runs-on: ubuntu-latest
    # `supabase link` does not save the DB password to disk (only project ref + pooler URL).
    # Each `pnpm supabase …` is a new process: `db push` must see SUPABASE_DB_PASSWORD again, or the
    # CLI uses the Management API "login role" path (fragile; see supabase/cli#4558 / timeouts / 544).
    # SUPABASE_ACCESS_TOKEN is required for `functions deploy` and any step that calls the API.
    # `--dns-resolver https`: GitHub-hosted runners often hit pooler timeouts with native DNS; see CLI global flag.
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Link Supabase project
        run: pnpm supabase link --dns-resolver https --project-ref $SUPABASE_PROJECT_REF --password "$SUPABASE_DB_PASSWORD"

      # Explicit --password: on GitHub-hosted Linux there is no credential store; newer CLIs may not
      # reuse the password from `link` for `db push`, which yields 28P01 even when the secret is correct.
      # --include-all: apply migrations whose timestamp sorts before an already-applied remote migration
      # (e.g. a migration merged after a later-dated one was deployed).
      - name: Push migrations
        run: pnpm supabase db push --dns-resolver https --yes --include-all --password "$SUPABASE_DB_PASSWORD"

      - name: Build packages used by Edge Functions
        run: |
          pnpm --filter @decentraguild/billing build
          pnpm --filter @decentraguild/catalog build
          pnpm --filter @decentraguild/condition-engine build

      - name: Sync address book defaults into Edge _shared
        run: node scripts/sync-address-book-defaults.mjs

      - name: Deploy Edge Functions
        run: pnpm supabase functions deploy --dns-resolver https
