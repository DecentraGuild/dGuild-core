# Pushes migrations and deploys Edge Functions to Supabase on changes to supabase/.
# No GitHub integration (Pro) needed: uses Supabase CLI with access token.
#
# Required repo secrets:
#   SUPABASE_ACCESS_TOKEN - create at https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD  - project database password (Settings → Database in dashboard)

name: Deploy Supabase

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
      - 'packages/core/src/address-book-defaults.data.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

env:
  SUPABASE_PROJECT_REF: uvktzcgghviyxausmkkc

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Link Supabase project
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: pnpm supabase link --project-ref $SUPABASE_PROJECT_REF --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations
        run: pnpm supabase db push

      - name: Build packages used by Edge Functions
        run: |
          pnpm --filter @decentraguild/billing build
          pnpm --filter @decentraguild/catalog build
          pnpm --filter @decentraguild/condition-engine build

      - name: Sync address book defaults into Edge _shared
        run: node scripts/sync-address-book-defaults.mjs

      - name: Deploy Edge Functions
        run: pnpm supabase functions deploy
