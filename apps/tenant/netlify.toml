# Tenant app (*.dguild.org)
# Netlify UI: leave Base directory unset (repo root). Set Package directory to "apps/tenant".
# Build runs from root; publish path is relative to base (repo root).

[build]
  command = "cd ../.. && corepack enable && pnpm install && pnpm -w run build:tenant"
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "20"